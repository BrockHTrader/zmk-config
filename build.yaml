---
include:
  - board: nice_nano
    shield: mint34_left
    cmake-args: >-
      -DCONFIG_ZMK_SPLIT=y
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  - board: nice_nano
    shield: mint34_right
    cmake-args: >-
      -DCONFIG_ZMK_SPLIT=y
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  - board: nice_nano
    shield: mint34_dongle
    snippet: studio-rpc-usb-uart

  - board: nice_nano
    shield: settings_reset